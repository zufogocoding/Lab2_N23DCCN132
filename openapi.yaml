openapi: 3.0.0
info:
  title: Order API
  version: 1.0.0
  description: API documentation for Order management system

servers:
  - url: http://localhost:5000/api

tags:
  - name: Orders
    description: Order management endpoints

paths:

  /orders:
    get:
      tags:
        - Orders
      summary: Get all orders
      description: Retrieve all orders with optional filtering and sorting
      parameters:
        - in: query
          name: status
          schema:
            type: string
          description: Filter orders by status
        - in: query
          name: sort
          schema:
            type: string
            enum: [asc, desc]
          description: Sort by totalAmount
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"

    post:
      tags:
        - Orders
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrder"
      responses:
        "201":
          description: Order created successfully
        "400":
          description: Invalid request

  /orders/search:
    get:
      tags:
        - Orders
      summary: Search orders by customer name
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
        "400":
          description: Missing search parameter

  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found

    put:
      tags:
        - Orders
      summary: Update order by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrder"
      responses:
        "200":
          description: Order updated
        "404":
          description: Not found

    delete:
      tags:
        - Orders
      summary: Delete order by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order deleted
        "404":
          description: Not found

components:
  schemas:

    Order:
      type: object
      properties:
        _id:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              quantity:
                type: number
              unitPrice:
                type: number
        totalAmount:
          type: number
        status:
          type: string
          example: pending
        createdAt:
          type: string
          format: date-time

    CreateOrder:
      type: object
      required:
        - customerName
        - customerEmail
        - items
        - totalAmount
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              quantity:
                type: number
              unitPrice:
                type: number
        totalAmount:
          type: number

    UpdateOrder:
      type: object
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
        items:
          type: array
        totalAmount:
          type: number
        status:
          type: string